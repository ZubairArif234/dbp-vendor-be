<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Boilerplate</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .card {
        background: white;
        padding: 2rem 3rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
      }
      code {
        background: #eee;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🚀 API Running</h1>
      <p>Replace this with your frontend build in <code>public/</code></p>
      <p>
        API base: <code>/api</code> &nbsp;|&nbsp; Health: <code>/health</code>
      </p>
    </div>
  </body>
</html>
